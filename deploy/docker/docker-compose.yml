version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: gaokao-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: your_password
      MYSQL_DATABASE: gaokao_ai
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../sql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=caching_sha2_password
    networks:
      - gaokao-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: gaokao-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass your_redis_password
    networks:
      - gaokao-network

  # 后端服务
  backend:
    build:
      context: ../../backend
      dockerfile: ../deploy/docker/Dockerfile-backend
    container_name: gaokao-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/gaokao_ai?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: your_password
    depends_on:
      - mysql
      - redis
    networks:
      - gaokao-network

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: gaokao-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf
      - ../nginx/ssl:/etc/nginx/ssl
      - ../../frontend/dist:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - gaokao-network

volumes:
  mysql_data:
  redis_data:

networks:
  gaokao-network:
    driver: bridge
