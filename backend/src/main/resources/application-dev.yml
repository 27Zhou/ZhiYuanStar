# =====================================================
# 开发环境配置
# =====================================================

# 数据源配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/gaokao_ai?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:}
    # HikariCP连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 10000
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

# 服务器配置
server:
  port: 8080

# 日志级别（开发环境更详细）
logging:
  level:
    com.gaokao.ai: debug
    org.springframework: info
    org.springframework.web: debug
    com.baomidou: debug
    org.springframework.security: debug

# Swagger配置（开发环境开启）
springdoc:
  swagger-ui:
    enabled: true

# JWT配置（开发环境可简化）
jwt:
  secret: dev-secret-key-for-gaokao-ai-backend-2024-very-long-and-secure
  expiration: 604800000  # 7天（开发环境延长）
