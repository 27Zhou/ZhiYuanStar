# =====================================================
# 智选未来 - 高考志愿辅助填报系统
# 主配置文件
# =====================================================

spring:
  # 激活开发环境配置
  profiles:
    active: dev

  # 应用名称
  application:
    name: gaokao-ai-backend

  # Jackson全局配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    uri-encoding: UTF-8
    max-swallow-size: -1

# MyBatis-Plus配置
mybatis-plus:
  # Mapper XML文件位置
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体类包位置
  type-aliases-package: com.gaokao.ai.entity
  configuration:
    # 驼峰命名转换
    map-underscore-to-camel-case: true
    # 日志输出
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 二级缓存
    cache-enabled: false
  global-config:
    db-config:
      # 主键策略：自增
      id-type: auto
      # 逻辑删除字段
      logic-delete-field: deleted
      # 逻辑删除值
      logic-delete-value: 1
      # 逻辑未删除值
      logic-not-delete-value: 0
      # 表名前缀
      table-prefix:

# Swagger / OpenAPI配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.gaokao.ai.controller

# 日志配置
logging:
  config: classpath:logback-spring.xml
  level:
    com.gaokao.ai: debug
    org.springframework: info
    org.springframework.web: info
    com.baomidou: debug

# JWT配置
jwt:
  secret: your-256-bit-secret-key-here-make-it-long-enough-for-security
  expiration: 86400000  # 24小时（毫秒）
  header: Authorization
  prefix: "Bearer "
